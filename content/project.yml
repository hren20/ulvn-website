teaser:
  image: /images/teaserulvn.png
  alt: Overview of unordered landmark visual navigation from image collections to RGB-only planning and replanning
  caption: >
    ULVN builds a navigable topological graph directly from unordered RGB images,
    then performs vision-only localization, planning, and dynamic replanning without
    odometry, depth, LiDAR, or temporal capture priors.
abstract: >
  Image-goal navigation is a fundamental capability for embodied AI, yet most
  existing systems rely on temporally ordered video streams, odometry, depth, or
  LiDAR to preserve spatial consistency. These assumptions restrict deployment
  when robots must operate from crowd-sourced or pre-recorded unordered image
  collections. We propose **Unordered Landmark Visual Navigation (ULVN)**, a
  unified RGB-only framework that integrates mapping, localization, and planning
  without temporal or multimodal priors. ULVN constructs a robust 2D topological
  map from unstructured images through calibrated visual place retrieval,
  geometric verification, maximum spanning forest refinement, and loop
  reinsertion. During closed-loop execution, a graph-based belief propagation
  localization filter uses entropy-adaptive fusion to track the robot under
  perceptual ambiguity, while belief-aware subgoal search plans and replans over
  the graph. Experiments in simulation and real-world robot deployments show
  that ULVN substantially improves mapping quality, localization robustness, and
  navigation success over strong baselines.
sections:
  - title: Method
    body: >
      ULVN contains three coupled components.


      **RAVEL** converts unordered images into a reliable landmark graph. It uses
      visual place retrieval for high-recall candidate discovery, calibrates
      verification thresholds from the data, verifies local geometry with feature
      inliers, extracts a maximum spanning forest to keep the strongest
      navigation backbone, and reinserts strong loop closures to preserve useful
      cyclic structure.


      **BPL** performs odometry-free localization on the resulting 2D graph. It
      propagates belief through graph reachability, measures observation
      likelihood with visual descriptors, and fuses prediction and observation
      through entropy-adaptive weights so that uncertain observations can lean
      more heavily on topology.


      **BASS** turns the belief state into closed-loop navigation. It anchors the
      start and goal images on the graph, searches for the widest path whose
      weakest visual transition is maximized, sends sequential landmark subgoals
      to a local visual planner, and triggers replanning when the belief moves
      away from the intended route.
    image: /images/pipline.png
    image_alt: ULVN pipeline with RAVEL graph construction, BPL localization, and BASS planning
    caption: ULVN integrates graph construction, belief propagation localization, and belief-aware subgoal search.
  - title: Results
    body: >
      On GRScenes, RAVEL achieves the strongest topological graph construction
      performance among the evaluated baselines, reaching **0.7104 precision**,
      **0.7656 recall**, **0.7365 F1**, and **0.9970 accuracy**. Compared with
      top-k retrieval and temporal-distance proxies, the calibrated geometric
      verification plus MSF refinement provides a better precision-recall balance
      for unordered maps.


      For global localization, BPL achieves **95.49%** accuracy in the global
      setting and **93.99%** on difficult paths with long routes, turns, and low
      start-goal visual overlap. Under viewpoint shifts, Gaussian noise, Poisson
      noise, and random cropping, BPL averages **0.930 +/- 0.040** localization
      accuracy across four datasets, outperforming MegaLoc, JIST, and ViNT.


      For navigation, ULVN improves over purely reactive baselines. Integrated
      with NoMaD, ULVN reaches **71.9% success rate**, **0.42 average
      collisions**, and **0.7978 SPL** on GRScenes; with ViNT, it reaches
      **68.1% success rate** and **0.8398 SPL**. The results indicate that
      lightweight topological memory reduces myopic oscillation and supports
      recovery from off-route execution.
    image: /images/ravelvisual.png
    image_alt: Descriptor and geometric verification correlations used to motivate RAVEL
    caption: VPR-trained descriptors correlate more strongly with geometric consistency than generic visual features, supporting retrieval before geometric verification.
  - title: Real-World Deployment
    body: >
      ULVN was deployed on a Diablo wheeled robot equipped with an Azure Kinect
      camera and an NVIDIA Jetson Orin. In representative real-world trials, the
      robot followed a planned visual landmark route, detected physical deviation
      through the BPL belief state, and used BASS to replan from the off-route
      node to the goal. This validates the sim-to-real viability of RGB-only,
      odometry-free navigation from unordered landmarks.
