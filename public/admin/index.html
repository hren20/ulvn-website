<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="2; url=https://app.pagescms.org/" />
    <title>Project Admin</title>
    <style>
      :root {
        color-scheme: light;
        --text: #1f2933;
        --muted: #607080;
        --accent: #176b87;
        --line: #d8dee8;
        --soft: #f7f9fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--soft);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        width: min(100% - 32px, 640px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 34px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.8rem;
        line-height: 1.2;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        padding: 8px 18px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Project Admin</h1>
      <p>This repository is configured for Pages CMS. You will be redirected to the hosted editor.</p>
      <a href="https://app.pagescms.org/">Open Pages CMS</a>
    </main>
  </body>
</html>
